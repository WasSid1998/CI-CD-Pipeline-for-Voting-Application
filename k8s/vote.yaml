apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote
  namespace: voting-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vote
      version: blue
  template:
    metadata:
      labels:
        app: vote
        version: blue
    spec:
      containers:
      - name: vote
        image: 13.63.130.160:5000/vote
        ports:
        - containerPort: 80
        env:
        - name: REDIS_HOST
          value: redis

----------------------------------------------

apiVersion: v1
kind: Service
metadata:
  name: vote
  namespace: voting-app
spec:
  selector:
    app: vote
    version: blue
  ports:
   - port: 80
