apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: voting-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
  spec:
    containers:
    - name: redis
      image: redis
      ports:
      - containerPort: 6379

________________________________________

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: voting-app
spec:
  selector:
   app: redis
  ports:
    - port: 6379
